<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f0f0f5;
    --border: #e0e0ea;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent3: #00c896;
    --accent4: #f59e0b;
    --text: #1a1a2e;
    --muted: #888899;
    --danger: #ef4444;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }



  .app { position: relative; z-index: 1; padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo-area h1 {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-area p {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-actions { display: flex; gap: 12px; align-items: center; }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.purple::after { background: var(--accent); }
  .stat-card.pink::after { background: var(--accent2); }
  .stat-card.green::after { background: var(--accent3); }
  .stat-card.yellow::after { background: var(--accent4); }

  .stat-card:hover { border-color: #3a3a4a; }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--font-head);
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-card.purple .stat-value { color: var(--accent); }
  .stat-card.pink .stat-value { color: var(--accent2); }
  .stat-card.green .stat-value { color: var(--accent3); }
  .stat-card.yellow .stat-value { color: var(--accent4); }

  .stat-card { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .project-tile { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .modal { box-shadow: 0 20px 60px rgba(0,0,0,0.15); }

  /* Controls */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .filter-tabs { display: flex; gap: 4px; }

  .tab {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }

  /* Project Grid */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  /* Project Tile */
  .project-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    animation: tileIn 0.4s ease both;
  }

  @keyframes tileIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .project-tile:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124, 106, 255, 0.12);
  }

  .project-tile.overdue { border-color: rgba(255, 79, 79, 0.4); }
  .project-tile.overdue:hover { border-color: var(--danger); box-shadow: 0 8px 32px rgba(255, 79, 79, 0.12); }

  .tile-color-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }

  .tile-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .tile-title {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
    margin-right: 12px;
  }

  .status-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .status-active { background: rgba(124,106,255,0.15); color: var(--accent); border: 1px solid rgba(124,106,255,0.3); }
  .status-review { background: rgba(255,188,106,0.12); color: var(--accent4); border: 1px solid rgba(255,188,106,0.3); }
  .status-complete { background: rgba(106,255,204,0.1); color: var(--accent3); border: 1px solid rgba(106,255,204,0.25); }
  .status-on-hold { background: rgba(102,102,128,0.15); color: var(--muted); border: 1px solid rgba(102,102,128,0.3); }
  .status-overdue { background: rgba(255,79,79,0.12); color: var(--danger); border: 1px solid rgba(255,79,79,0.3); }

  .tile-desc {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .tile-meta {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .meta-item {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .meta-item svg { opacity: 0.6; }

  .meta-item.due-soon { color: var(--accent4); }
  .meta-item.overdue-date { color: var(--danger); }

  /* Progress bar */
  .progress-wrap { margin-bottom: 16px; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .tile-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .priority-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .priority-high { background: var(--danger); }
  .priority-med { background: var(--accent4); }
  .priority-low { background: var(--accent3); }

  .priority-label { font-size: 11px; color: var(--muted); }

  .tile-actions { display: flex; gap: 6px; }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-size: 12px;
  }

  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.delete:hover { border-color: var(--danger); color: var(--danger); }

  /* Add button */
  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .btn-primary:hover { background: #6a5aef; transform: translateY(-1px); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal h2 {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 24px;
  }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent); }

  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 14px; margin-bottom: 20px; }

  .color-options { display: flex; gap: 8px; flex-wrap: wrap; }

  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
  }

  .color-swatch.selected { border-color: white; transform: scale(1.15); }

  @media (max-width: 768px) {
    .app { padding: 16px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .project-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-area">
      <h1>ProjectPulse</h1>
      <p>Track · Manage · Deliver</p>
    </div>
    <div class="header-actions">
      <span id="currentDate" style="font-size:12px;color:var(--muted)"></span>
      <button class="btn-primary" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New Project
      </button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card purple">
      <div class="stat-label">Total Projects</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card pink">
      <div class="stat-label">In Progress</div>
      <div class="stat-value" id="statActive">0</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-label">Due This Week</div>
      <div class="stat-value" id="statWeek">0</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Completed</div>
      <div class="stat-value" id="statDone">0</div>
    </div>
  </div>

  <div class="controls">
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('all', this)">All</button>
      <button class="tab" onclick="setFilter('active', this)">Active</button>
      <button class="tab" onclick="setFilter('review', this)">In Review</button>
      <button class="tab" onclick="setFilter('overdue', this)">Overdue</button>
      <button class="tab" onclick="setFilter('complete', this)">Done</button>
    </div>
    <select class="sort-select" onchange="setSort(this.value)">
      <option value="dueDate">Sort: Due Date</option>
      <option value="priority">Sort: Priority</option>
      <option value="progress">Sort: Progress</option>
      <option value="name">Sort: Name</option>
    </select>
  </div>

  <div class="project-grid" id="projectGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modalTitle">New Project</h2>
    <div class="form-group">
      <label>Project Name</label>
      <input type="text" id="fName" placeholder="e.g. Website Redesign" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="fDesc" placeholder="Brief project summary..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="fDue" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="fStatus">
          <option value="active">Active</option>
          <option value="review">In Review</option>
          <option value="on-hold">On Hold</option>
          <option value="complete">Complete</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select id="fPriority">
          <option value="high">High</option>
          <option value="med">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="form-group">
        <label>Progress (%)</label>
        <input type="number" id="fProgress" min="0" max="100" value="0" />
      </div>
    </div>
    <div class="form-group">
      <label>Color Tag</label>
      <div class="color-options" id="colorOptions"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#7c6aff','#ff6a9e','#6affcc','#ffbc6a','#ff4f4f','#6ab4ff','#d96aff','#6affa0'];
let projects = JSON.parse(localStorage.getItem('pp_projects') || '[]');
let filter = 'all';
let sortBy = 'dueDate';
let editingId = null;

// Seed sample data if empty
if (projects.length === 0) {
  const today = new Date();
  const d = (days) => { const t = new Date(today); t.setDate(t.getDate()+days); return t.toISOString().split('T')[0]; };
  projects = [
    { id: 1, name: 'Website Redesign', desc: 'Full overhaul of the company marketing site with new branding.', due: d(12), status: 'active', priority: 'high', progress: 65, color: '#7c6aff' },
    { id: 2, name: 'Q2 Marketing Campaign', desc: 'Launch email and social strategy for spring product push.', due: d(5), status: 'review', priority: 'high', progress: 80, color: '#ff6a9e' },
    { id: 3, name: 'Mobile App MVP', desc: 'Build and test the core feature set for the iOS/Android app.', due: d(30), status: 'active', priority: 'med', progress: 30, color: '#6ab4ff' },
    { id: 4, name: 'Data Pipeline Migration', desc: 'Move legacy ETL jobs to new cloud infrastructure.', due: d(-3), status: 'active', priority: 'high', progress: 55, color: '#ffbc6a' },
    { id: 5, name: 'Brand Guidelines Doc', desc: 'Create comprehensive visual identity guide for internal teams.', due: d(20), status: 'complete', priority: 'low', progress: 100, color: '#6affcc' },
    { id: 6, name: 'Customer Survey Analysis', desc: 'Analyze and report on Q1 NPS survey responses.', due: d(7), status: 'on-hold', priority: 'med', progress: 15, color: '#d96aff' },
  ];
  save();
}

function save() { localStorage.setItem('pp_projects', JSON.stringify(projects)); }

function daysUntil(dateStr) {
  const now = new Date(); now.setHours(0,0,0,0);
  const due = new Date(dateStr); due.setHours(0,0,0,0);
  return Math.round((due - now) / 86400000);
}

function isOverdue(p) { return p.status !== 'complete' && daysUntil(p.due) < 0; }

function statusLabel(p) {
  if (isOverdue(p)) return { cls: 'status-overdue', text: 'Overdue' };
  if (p.status === 'active') return { cls: 'status-active', text: 'Active' };
  if (p.status === 'review') return { cls: 'status-review', text: 'In Review' };
  if (p.status === 'complete') return { cls: 'status-complete', text: 'Complete' };
  return { cls: 'status-on-hold', text: 'On Hold' };
}

function updateStats() {
  const now = new Date(); now.setHours(0,0,0,0);
  const weekOut = new Date(now); weekOut.setDate(weekOut.getDate()+7);
  document.getElementById('statTotal').textContent = projects.length;
  document.getElementById('statActive').textContent = projects.filter(p => p.status === 'active' || p.status === 'review').length;
  document.getElementById('statDone').textContent = projects.filter(p => p.status === 'complete').length;
  document.getElementById('statWeek').textContent = projects.filter(p => {
    const d = new Date(p.due); d.setHours(0,0,0,0);
    return p.status !== 'complete' && d >= now && d <= weekOut;
  }).length;
}

function getFiltered() {
  let list = [...projects];
  if (filter === 'active') list = list.filter(p => p.status === 'active');
  else if (filter === 'review') list = list.filter(p => p.status === 'review');
  else if (filter === 'complete') list = list.filter(p => p.status === 'complete');
  else if (filter === 'overdue') list = list.filter(p => isOverdue(p));

  const pri = { high: 0, med: 1, low: 2 };
  list.sort((a, b) => {
    if (sortBy === 'dueDate') return new Date(a.due) - new Date(b.due);
    if (sortBy === 'priority') return pri[a.priority] - pri[b.priority];
    if (sortBy === 'progress') return b.progress - a.progress;
    if (sortBy === 'name') return a.name.localeCompare(b.name);
  });
  return list;
}

function formatDue(p) {
  const days = daysUntil(p.due);
  const d = new Date(p.due);
  const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  if (p.status === 'complete') return { text: label, cls: '' };
  if (days < 0) return { text: `${Math.abs(days)}d overdue`, cls: 'overdue-date' };
  if (days === 0) return { text: 'Due today', cls: 'due-soon' };
  if (days <= 3) return { text: `${days}d left`, cls: 'due-soon' };
  return { text: label, cls: '' };
}

function render() {
  updateStats();
  const grid = document.getElementById('projectGrid');
  const list = getFiltered();

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">📋</div>
      <p>No projects here yet. Add one to get started!</p>
      <button class="btn-primary" onclick="openModal()" style="margin:0 auto">+ New Project</button>
    </div>`;
    return;
  }

  grid.innerHTML = list.map((p, i) => {
    const { cls, text } = statusLabel(p);
    const due = formatDue(p);
    const overdue = isOverdue(p);
    const priColor = { high: 'var(--danger)', med: 'var(--accent4)', low: 'var(--accent3)' }[p.priority];
    const priLabel = { high: 'High', med: 'Medium', low: 'Low' }[p.priority];
    const progColor = p.progress >= 100 ? 'var(--accent3)' : p.progress >= 60 ? 'var(--accent)' : 'var(--accent2)';

    return `<div class="project-tile ${overdue ? 'overdue' : ''}" style="animation-delay:${i*0.05}s">
      <div class="tile-color-bar" style="background:${p.color}"></div>
      <div class="tile-header">
        <div class="tile-title">${p.name}</div>
        <span class="status-badge ${cls}">${text}</span>
      </div>
      <div class="tile-desc">${p.desc || 'No description provided.'}</div>
      <div class="tile-meta">
        <span class="meta-item ${due.cls}">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor"/><path d="M6 3v3l2 2" stroke="currentColor" stroke-linecap="round"/></svg>
          ${due.text}
        </span>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Progress</span><span>${p.progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%;background:${progColor}"></div></div>
      </div>
      <div class="tile-footer">
        <div>
          <span class="priority-dot priority-${p.priority}" style="background:${priColor}"></span>
          <span class="priority-label">${priLabel} Priority</span>
        </div>
        <div class="tile-actions">
          <button class="icon-btn" onclick="editProject(${p.id})" title="Edit">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2L4 10H2V8L8.5 1.5z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn delete" onclick="deleteProject(${p.id})" title="Delete">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M5 3V2h2v1M4 5v4M8 5v4M3 3l.5 7h5L9 3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Color picker
function buildColors(selected) {
  document.getElementById('colorOptions').innerHTML = COLORS.map(c =>
    `<div class="color-swatch ${c===selected?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}

let selectedColor = COLORS[0];
function selectColor(c) {
  selectedColor = c;
  buildColors(c);
}

function openModal(p = null) {
  editingId = p ? p.id : null;
  document.getElementById('modalTitle').textContent = p ? 'Edit Project' : 'New Project';
  document.getElementById('fName').value = p?.name || '';
  document.getElementById('fDesc').value = p?.desc || '';
  document.getElementById('fDue').value = p?.due || '';
  document.getElementById('fStatus').value = p?.status || 'active';
  document.getElementById('fPriority').value = p?.priority || 'high';
  document.getElementById('fProgress').value = p?.progress || 0;
  selectedColor = p?.color || COLORS[0];
  buildColors(selectedColor);
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function handleOverlayClick(e) { if (e.target.id === 'modalOverlay') closeModal(); }

function saveProject() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').style.borderColor='var(--danger)'; return; }
  document.getElementById('fName').style.borderColor='';

  const data = {
    name,
    desc: document.getElementById('fDesc').value.trim(),
    due: document.getElementById('fDue').value,
    status: document.getElementById('fStatus').value,
    priority: document.getElementById('fPriority').value,
    progress: Math.min(100, Math.max(0, parseInt(document.getElementById('fProgress').value) || 0)),
    color: selectedColor,
  };

  if (editingId) {
    const idx = projects.findIndex(p => p.id === editingId);
    if (idx !== -1) projects[idx] = { ...projects[idx], ...data };
  } else {
    projects.push({ id: Date.now(), ...data });
  }

  save(); closeModal(); render();
}

function editProject(id) {
  const p = projects.find(p => p.id === id);
  if (p) openModal(p);
}

function deleteProject(id) {
  if (!confirm('Delete this project?')) return;
  projects = projects.filter(p => p.id !== id);
  save(); render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setSort(v) { sortBy = v; render(); }

// Date display
const today = new Date();
document.getElementById('currentDate').textContent = today.toLocaleDateString('en-US', { weekday:'short', month:'long', day:'numeric', year:'numeric' });

render();
</script>
</body>
</html>
